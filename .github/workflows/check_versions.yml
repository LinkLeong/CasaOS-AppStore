name: Check Docker Compose Image Versions

on:
  workflow_dispatch:
    inputs:
      latest_strategy:
        description: '选择确定最新版本的策略'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - semver

jobs:
  find_compose_files:
    runs-on: ubuntu-latest
    outputs:
      compose_files: ${{ steps.find_files.outputs.files }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 查找所有 docker-compose.yml 文件
        id: find_files
        run: |
          # 显式安装 jq（可选，如果版本过低）
          sudo apt-get update && sudo apt-get install jq -y

          # 查找文件并生成 JSON 数组
          mapfile -t files < <(find Apps -name "docker-compose.yml" -type f)

          # 调试输出
          echo "找到的文件列表：" >&2
          printf '%s\n' "${files[@]}" | tee /tmp/files.log

          # 生成合法 JSON
          json_files=$(printf '%s\n' "${files[@]}" | jq -s '.')
          echo "生成的 JSON：" >&2
          echo "$json_files" | tee /tmp/json.log

          # 设置输出
          echo "::set-output name=compose_files::${json_files}"
        shell: bash

  check_versions:
    needs: find_compose_files
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compose_file: ${{ fromJson(needs.find_compose_files.outputs.compose_files) }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: 检查版本
        run: |
          python check_versions.py "${{ matrix.compose_file }}" "${{ github.event.inputs.latest_strategy }}"

      - name: 上传版本检查报告
        uses: actions/upload-artifact@v3
        with:
          name: version-check-report-${{ matrix.compose_file }}
          path: version_check.md
