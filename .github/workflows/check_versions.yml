name: Check Docker Compose Image Versions

on:
  workflow_dispatch:
    inputs:
      latest_strategy:
        description: '选择确定最新版本的策略'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest  # 使用 'latest' 标签作为最新版本
          - semver  # 使用最高语义化版本（如 v1.2.3）作为最新版本

jobs:
  find_compose_files:
    runs-on: ubuntu-latest
    outputs:
      compose_files: ${{ steps.find_files.outputs.files }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 查找所有 docker-compose.yml 文件
        id: find_files
        run: |
          files=$(find Apps -name "docker-compose.yml" -type f | jq -R . | jq -s .)
          echo "files=$files" >> $GITHUB_OUTPUT
        shell: bash

  check_versions:
    needs: find_compose_files
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compose_file: ${{ fromJson(needs.find_compose_files.outputs.compose_files) }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: 检查版本
        run: |
          python check_versions.py "${{ matrix.compose_file }}" "${{ github.event.inputs.latest_strategy }}"

      - name: 上传版本检查报告
        uses: actions/upload-artifact@v3
        with:
          name: version-check-report-${{ matrix.compose_file }}
          path: version_check.md
